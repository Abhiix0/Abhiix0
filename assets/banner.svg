<svg width="100%" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#0f172a;#22D3EE" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#grad)" />

  <text x="50%" y="55%" text-anchor="middle" fill="white" font-size="40" font-family="Arial">
    <animate attributeName="opacity" values="0;1" dur="2s" fill="freeze"/>
    Name’s Abhinav
  </text>
</svg>
