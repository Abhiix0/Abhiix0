<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Python pill gradient -->
    <linearGradient id="pyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow-blue" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" fill="url(#bg)"/>

  <!-- ═══ ROW 1: Python Stack — one wide pill ═══ -->
  <!-- Outer glow ring -->
  <rect x="149" y="10" width="502" height="34" rx="17" fill="none" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4" filter="url(#glow-blue)"/>
  <!-- Pill bg -->
  <rect x="150" y="11" width="500" height="32" rx="16" fill="#0f172a"/>
  <!-- Left accent bar -->
  <rect x="150" y="11" width="8" height="32" rx="4" fill="#3b82f6"/>
  <!-- Snake emoji bg dot -->
  <circle cx="174" cy="27" r="10" fill="#1e3a5f"/>
  <text x="174" y="32" text-anchor="middle" font-size="13">🐍</text>
  <!-- Label -->
  <text x="192" y="32" font-size="11.5" fill="#94a3b8" font-weight="600" letter-spacing="0.5">Python Stack</text>
  <!-- Divider -->
  <line x1="258" y1="17" x2="258" y2="37" stroke="#1e3a5f" stroke-width="1.5"/>
  <!-- Pills inside -->
  <!-- Pandas -->
  <rect x="265" y="17" width="54" height="18" rx="9" fill="#150458" stroke="#3730a3" stroke-width="0.8"/>
  <text x="292" y="30" text-anchor="middle" font-size="9.5" fill="#a5b4fc" font-weight="600">Pandas</text>
  <!-- NumPy -->
  <rect x="325" y="17" width="50" height="18" rx="9" fill="#013243" stroke="#0e7490" stroke-width="0.8"/>
  <text x="350" y="30" text-anchor="middle" font-size="9.5" fill="#67e8f9" font-weight="600">NumPy</text>
  <!-- Matplotlib -->
  <rect x="381" y="17" width="66" height="18" rx="9" fill="#11224a" stroke="#1d4ed8" stroke-width="0.8"/>
  <text x="414" y="30" text-anchor="middle" font-size="9.5" fill="#93c5fd" font-weight="600">Matplotlib</text>
  <!-- Seaborn -->
  <rect x="453" y="17" width="56" height="18" rx="9" fill="#0c1f3f" stroke="#2563eb" stroke-width="0.8"/>
  <text x="481" y="30" text-anchor="middle" font-size="9.5" fill="#bfdbfe" font-weight="600">Seaborn</text>
  <!-- Scikit hint -->
  <rect x="515" y="17" width="28" height="18" rx="9" fill="#1a1a2e" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="2,1.5"/>
  <text x="529" y="30" text-anchor="middle" font-size="8.5" fill="#818cf8">+more</text>

  <!-- ═══ ROW 2: Data tools ═══ -->
  <!-- SQL -->
  <rect x="40" y="58" width="52" height="26" rx="13" fill="#001f2e" stroke="#0e7490" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="66" y="75" text-anchor="middle" font-size="10.5" fill="#22d3ee" font-weight="700">SQL</text>
  <!-- Excel -->
  <rect x="100" y="58" width="56" height="26" rx="13" fill="#0a2e1a" stroke="#15803d" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="128" y="75" text-anchor="middle" font-size="10.5" fill="#4ade80" font-weight="700">Excel</text>
  <!-- Power BI -->
  <rect x="164" y="58" width="70" height="26" rx="13" fill="#2a2000" stroke="#ca8a04" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="199" y="75" text-anchor="middle" font-size="10.5" fill="#fbbf24" font-weight="700">Power BI</text>
  <!-- Postman -->
  <rect x="242" y="58" width="72" height="26" rx="13" fill="#2a1000" stroke="#ea580c" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="278" y="75" text-anchor="middle" font-size="10.5" fill="#fb923c" font-weight="700">Postman</text>
  <!-- Docker -->
  <rect x="322" y="58" width="66" height="26" rx="13" fill="#001a2e" stroke="#0369a1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="355" y="75" text-anchor="middle" font-size="10.5" fill="#38bdf8" font-weight="700">Docker</text>
  <!-- Vercel -->
  <rect x="396" y="58" width="60" height="26" rx="13" fill="#0a0a0a" stroke="#52525b" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="426" y="75" text-anchor="middle" font-size="10.5" fill="#e4e4e7" font-weight="700">Vercel</text>
  <!-- Render -->
  <rect x="464" y="58" width="62" height="26" rx="13" fill="#012a20" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="495" y="75" text-anchor="middle" font-size="10.5" fill="#34d399" font-weight="700">Render</text>
  <!-- Netlify -->
  <rect x="534" y="58" width="64" height="26" rx="13" fill="#002a28" stroke="#0d9488" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="566" y="75" text-anchor="middle" font-size="10.5" fill="#2dd4bf" font-weight="700">Netlify</text>

  <!-- ═══ ROW 3: Automation / AI ═══ -->
  <!-- n8n -->
  <rect x="200" y="100" width="54" height="26" rx="13" fill="#2a0015" stroke="#be185d" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="227" y="117" text-anchor="middle" font-size="10.5" fill="#f472b6" font-weight="700">n8n</text>
  <!-- Lyzr Studio -->
  <rect x="262" y="100" width="100" height="26" rx="13" fill="#16002e" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="312" y="117" text-anchor="middle" font-size="10.5" fill="#c084fc" font-weight="700">Lyzr Studio</text>
  <!-- APIs -->
  <rect x="370" y="100" width="88" height="26" rx="13" fill="#1a0a00" stroke="#c2410c" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="414" y="117" text-anchor="middle" font-size="10.5" fill="#fdba74" font-weight="700">REST APIs</text>

  <!-- bottom fade line -->
  <line x1="60" y1="148" x2="740" y2="148" stroke="#1e293b" stroke-width="1"/>
  <text x="400" y="158" text-anchor="middle" font-size="9" fill="#334155" letter-spacing="3">· · · always expanding · · ·</text>
</svg>
